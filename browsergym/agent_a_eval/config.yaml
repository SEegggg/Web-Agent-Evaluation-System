# ============================================================
# Agent A 自动评审系统 — 配置文件
# ============================================================
# 使用方法:
#   python scripts/run_eval.py                        # 使用默认配置
#   python scripts/run_eval.py --config my_config.yaml # 使用自定义配置
#
# 所有路径如未指定绝对路径，则相对于本配置文件所在目录解析。
#
# 敏感信息（api_key / password）通过环境变量或 .env 文件设置，
# 优先级: 系统环境变量 > .env > 本配置文件
# ============================================================

# ──────────────────────────────────────────────────────────
# 驱动 Agent LLM（操作浏览器、执行测试的 Agent）
# ──────────────────────────────────────────────────────────
driver_agent:
  provider: openai              # openai | anthropic
  model: deepseek-v4-flash      # 模型名称
  api_key: null                 # 留空则从 OPENAI_API_KEY 或 ANTHROPIC_API_KEY 环境变量读取
  base_url: null                # 留空则从 OPENAI_BASE_URL 或 ANTHROPIC_BASE_URL 环境变量读取
  temperature: 0.1
  max_tokens: 200000
  # 以下为 BrowserGym DemoAgent 特有参数
  chat_mode: false              # true = 多轮对话模式
  demo_mode: "off"              # "default" = 视觉特效, "off" = 无特效
  use_html: false
  use_axtree: true
  use_screenshot: false

# ──────────────────────────────────────────────────────────
# 评审 Agent LLM（独立于浏览器、对结果评分的 Agent）
# ──────────────────────────────────────────────────────────
evaluator:
  provider: openai              # openai | anthropic
  model: deepseek-v4-flash      # 模型名称
  api_key: null                 # 留空则从 OPENAI_API_KEY 或 ANTHROPIC_API_KEY 环境变量读取
  base_url: null
  temperature: 0.1
  max_tokens: 200000

# ──────────────────────────────────────────────────────────
# 登录配置（Agent A 访问前需先登录）
# ──────────────────────────────────────────────────────────
login:
  url: ""                       # 登录页面 URL，留空则跳过登录；或 AGENT_A_EVAL_LOGIN_URL
  username: ""                  # 登录用户名；或 AGENT_A_EVAL_LOGIN_USERNAME
  password: ""                  # 登录密码；或 AGENT_A_EVAL_LOGIN_PASSWORD
  user_data_dir: "./browser_profile"  # 持久化浏览器 profile 目录

# ──────────────────────────────────────────────────────────
# 浏览器配置
# ──────────────────────────────────────────────────────────
browser:
  headless: true
  viewport_width: 1280
  viewport_height: 900
  slow_mo: 500                  # 操作间隔（ms）
  timeout: 10000                # Playwright 单次操作超时（ms）

# ──────────────────────────────────────────────────────────
# 路径配置
# ──────────────────────────────────────────────────────────
paths:
  tasks_dir: tasks              # 任务 .md 文件目录
  datasets_dir: test_data/datasets  # 测试数据集目录
  exp_root: ./results           # 实验结果输出目录
  reports_dir: ./reports        # 评分报告输出目录

# ──────────────────────────────────────────────────────────
# 评测设置
# ──────────────────────────────────────────────────────────
evaluation:
  tasks: []                     # 待评测的任务列表，[] = 自动扫描全部
  generalization_datasets: 3    # 泛化性测试使用的数据集数量
  stability_seeds: [42, 123, 456]  # 稳定性测试的随机种子
  max_steps: 200                # 每个实验的最大步数
  task_datasets: {}             # 可选：为特定任务指定数据集列表
